name: Automacao Mercado Livre

on:
  schedule:
    - cron: '0 10 * * *'  # todo dia 10h UTC (7h Brasil)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar service_account.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > service_account.json

      - name: Rodar automação
        run: python automacao.py
